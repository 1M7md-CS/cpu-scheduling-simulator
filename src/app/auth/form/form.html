<div class="auth-container">
  <div class="auth-card">
    <div class="logo">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="32"
        height="32"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>

      <span>{{ logoText() }}</span>
    </div>

    <h2>{{ title() }}</h2>
    <p class="subtitle">{{ subtitle() }}</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">EMAIL</label>

        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          [(ngModel)]="email"
        />
      </div>

      <div class="form-group">
        <label for="password">PASSWORD</label>

        <input
          type="password"
          id="password"
          name="password"
          [placeholder]="passwordPlaceholder()"
          required
          [(ngModel)]="password"
        />
      </div>

      @if (message()) {
        <div [class]="'message ' + messageType()">
          {{ message() }}
        </div>
      }

      <button type="submit">
        {{ buttonText() }}
      </button>
    </form>

    <p class="toggle">
      {{ toggleText() }}
      <a (click)="toggleClicked.emit()">{{ toggleLinkText() }}</a>
    </p>
  </div>
</div>
